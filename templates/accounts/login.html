{% extends 'base.html' %}
{% block title %}Login — Zayro Teams{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <h1><i class="fas fa-layer-group" style="color:var(--accent)"></i></h1>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to Zayro Teams</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      {% if form.errors %}<div class="alert alert-error">Invalid email or password.</div>{% endif %}
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Sign In</button>
      </div>
    </form>
    <p class="mt-4 text-muted" style="text-align:center;font-size:.85rem;">
      Don't have an account? <a href="{% url 'accounts:register' %}">Register</a>
    </p>
  </div>
</div>
{% endblock %}
