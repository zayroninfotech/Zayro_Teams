<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Zayro Teams{% endblock %}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #1e1f22;
    --sidebar-bg: #2b2d31;
    --card-bg: #313338;
    --accent: #5865f2;
    --accent-hover: #4752c4;
    --green: #23a559;
    --red: #f23f42;
    --text: #dbdee1;
    --muted: #80848e;
    --border: #3f4147;
    --input-bg: #1e1f22;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* NAVBAR */
  .navbar { background: var(--sidebar-bg); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .navbar-brand { font-size: 1.2rem; font-weight: 700; color: var(--white); display: flex; align-items: center; gap: 8px; }
  .navbar-brand i { color: var(--accent); }
  .navbar-nav { display: flex; align-items: center; gap: 16px; }
  .navbar-nav a { color: var(--muted); font-size: .9rem; transition: color .2s; }
  .navbar-nav a:hover { color: var(--white); text-decoration: none; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: .9rem; font-weight: 500; transition: background .2s; }
  .btn-primary { background: var(--accent); color: var(--white); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { background: var(--red); color: var(--white); }
  .btn-success { background: var(--green); color: var(--white); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: .8rem; }

  /* LAYOUT */
  .app-layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 240px; background: var(--sidebar-bg); display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .sidebar-section { padding: 8px 0; }
  .sidebar-header { padding: 8px 16px; font-size: .75rem; font-weight: 600; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-item { display: flex; align-items: center; gap: 8px; padding: 6px 16px; color: var(--muted); font-size: .9rem; cursor: pointer; border-radius: 4px; margin: 1px 8px; transition: background .15s, color .15s; }
  .sidebar-item:hover, .sidebar-item.active { background: var(--card-bg); color: var(--white); text-decoration: none; }
  .sidebar-item i { width: 18px; text-align: center; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 700; color: var(--white); flex-shrink: 0; }
  .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  .online-dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; border: 2px solid var(--sidebar-bg); }

  /* MAIN CONTENT */
  .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .content-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--card-bg); flex-shrink: 0; }
  .content-header h2 { font-size: 1rem; font-weight: 600; }
  .content-body { flex: 1; overflow-y: auto; padding: 20px; }

  /* MESSAGES */
  .msg-list { display: flex; flex-direction: column; gap: 2px; }
  .msg { display: flex; align-items: flex-start; gap: 12px; padding: 4px 8px; border-radius: 4px; }
  .msg:hover { background: rgba(0,0,0,.1); }
  .msg-body { flex: 1; }
  .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
  .msg-sender { font-weight: 600; font-size: .9rem; color: var(--white); }
  .msg-time { font-size: .75rem; color: var(--muted); }
  .msg-content { font-size: .9rem; line-height: 1.4; }

  /* MSG INPUT */
  .msg-input-area { padding: 16px 20px; flex-shrink: 0; }
  .msg-input-wrap { display: flex; background: var(--input-bg); border-radius: 8px; border: 1px solid var(--border); align-items: center; padding: 0 12px; }
  .msg-input-wrap input { flex: 1; background: none; border: none; outline: none; color: var(--text); padding: 12px 8px; font-size: .9rem; }
  .msg-input-wrap button { background: none; border: none; color: var(--muted); cursor: pointer; padding: 8px 4px; font-size: 1rem; transition: color .2s; }
  .msg-input-wrap button:hover { color: var(--accent); }

  /* FORMS */
  .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
  .auth-card { background: var(--card-bg); padding: 40px; border-radius: 8px; width: 100%; max-width: 420px; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .auth-card h1 { text-align: center; margin-bottom: 8px; font-size: 1.6rem; color: var(--white); }
  .auth-card p.subtitle { text-align: center; color: var(--muted); margin-bottom: 28px; font-size: .9rem; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-size: .85rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: .9rem; outline: none; transition: border-color .2s; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-error { color: var(--red); font-size: .8rem; margin-top: 4px; }
  .form-actions { margin-top: 24px; }
  .form-actions .btn { width: 100%; justify-content: center; padding: 12px; font-size: 1rem; }

  /* ALERTS */
  .alert { padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; font-size: .9rem; }
  .alert-success { background: rgba(35,165,89,.2); border: 1px solid var(--green); color: #57f287; }
  .alert-error { background: rgba(242,63,66,.2); border: 1px solid var(--red); color: #ff7070; }
  .alert-info { background: rgba(88,101,242,.2); border: 1px solid var(--accent); color: #c9d0ff; }

  /* CARDS */
  .card { background: var(--card-bg); border-radius: 8px; padding: 20px; border: 1px solid var(--border); }
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .team-card { background: var(--card-bg); border-radius: 8px; padding: 20px; border: 1px solid var(--border); transition: border-color .2s, transform .2s; cursor: pointer; }
  .team-card:hover { border-color: var(--accent); transform: translateY(-2px); text-decoration: none; }
  .team-card h3 { color: var(--white); margin-bottom: 6px; }
  .team-card p { color: var(--muted); font-size: .85rem; }

  /* CALL PAGE */
  .call-container { display: flex; flex-direction: column; height: 100%; background: #111; }
  .video-grid { flex: 1; display: grid; gap: 8px; padding: 16px; place-items: center; }
  .video-wrap { position: relative; border-radius: 12px; overflow: hidden; background: #1e1f22; }
  .video-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .video-label { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,.6); padding: 4px 8px; border-radius: 4px; font-size: .8rem; color: var(--white); }
  .call-controls { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 20px; background: rgba(0,0,0,.5); }
  .ctrl-btn { width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: transform .2s; }
  .ctrl-btn:hover { transform: scale(1.1); }
  .ctrl-btn.mute { background: var(--border); color: var(--white); }
  .ctrl-btn.mute.active { background: var(--red); }
  .ctrl-btn.cam { background: var(--border); color: var(--white); }
  .ctrl-btn.cam.active { background: var(--red); }
  .ctrl-btn.hangup { background: var(--red); color: var(--white); }

  /* USER LIST */
  .user-list-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; transition: background .15s; }
  .user-list-item:hover { background: var(--card-bg); text-decoration: none; }
  .user-list-item .name { color: var(--white); font-size: .9rem; }
  .user-list-item .status { font-size: .75rem; color: var(--muted); }

  /* MEMBER ROLE */
  .badge { padding: 2px 8px; border-radius: 12px; font-size: .75rem; font-weight: 600; }
  .badge-admin { background: rgba(88,101,242,.3); color: #c9d0ff; }
  .badge-member { background: var(--border); color: var(--muted); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .text-muted { color: var(--muted); }
  .text-white { color: var(--white); }
  .mt-2 { margin-top: 8px; }
  .mt-4 { margin-top: 16px; }
  .flex { display: flex; }
  .gap-2 { gap: 8px; }
  .items-center { align-items: center; }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% if user.is_authenticated %}
<nav class="navbar">
  <a href="{% url 'teams:dashboard' %}" class="navbar-brand"><i class="fas fa-layer-group"></i> Zayro Teams</a>
  <div class="navbar-nav">
    <a href="{% url 'accounts:profile' %}"><i class="fas fa-user"></i> {{ user.display_name }}</a>
    <a href="{% url 'accounts:logout' %}"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>
</nav>
{% endif %}
{% block messages_block %}
{% if messages %}
<div style="position:fixed;top:60px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags|default:'info' }}" style="min-width:280px;box-shadow:0 4px 12px rgba(0,0,0,.4);">
    {{ msg }}
  </div>
  {% endfor %}
</div>
<script>setTimeout(()=>document.querySelectorAll('.alert').forEach(e=>e.remove()),4000)</script>
{% endif %}
{% endblock %}
{% block body %}{% endblock %}
</body>
</html>
