{% extends 'base.html' %}
{% block title %}Create Team — Zayro Teams{% endblock %}
{% block body %}
<div class="app-layout">
  {% include 'teams/_sidebar.html' %}
  <div class="main-content">
    <div class="content-header">
      <i class="fas fa-plus-circle" style="color:var(--accent)"></i>
      <h2>Create a New Team</h2>
    </div>
    <div class="content-body" style="max-width:480px;">
      <div class="card">
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label>Team Name</label>
            <input type="text" name="name" placeholder="e.g. Design Team" required autofocus>
          </div>
          <div class="form-group">
            <label>Description <span class="text-muted">(optional)</span></label>
            <textarea name="description" placeholder="What is this team about?"></textarea>
          </div>
          <div class="form-actions" style="display:flex;gap:12px;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Create Team</button>
            <a href="{% url 'teams:dashboard' %}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
