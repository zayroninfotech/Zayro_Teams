{% extends 'base.html' %}
{% block title %}Schedule Meeting — Zayro Teams{% endblock %}
{% block body %}
<div class="app-layout">
  {% include 'teams/_sidebar.html' %}
  <div class="main-content">
    <div class="content-header">
      <i class="fas fa-calendar-plus" style="color:var(--accent)"></i>
      <h2>Schedule a Meeting</h2>
    </div>
    <div class="content-body" style="max-width:560px;">
      <div class="card">
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label>Meeting Title</label>
            <input type="text" name="title" placeholder="e.g. Weekly Standup" required>
          </div>
          <div class="form-group">
            <label>Description (optional)</label>
            <textarea name="description" placeholder="What's this meeting about?"></textarea>
          </div>
          <div class="form-group">
            <label>Date & Time</label>
            <input type="datetime-local" name="scheduled_at" required>
          </div>
          <div class="form-group">
            <label>Call Type</label>
            <select name="call_type">
              <option value="video">📹 Video Call</option>
              <option value="audio">🎙️ Audio Only</option>
            </select>
          </div>
          {% if teams %}
          <div class="form-group">
            <label>Team (optional)</label>
            <select name="team_id">
              <option value="">— No team —</option>
              {% for t in teams %}
              <option value="{{ t.pk }}">{{ t.name }}</option>
              {% endfor %}
            </select>
          </div>
          {% endif %}
          <div class="form-actions">
            <button type="submit" class="btn btn-primary"><i class="fas fa-calendar-check"></i> Create Meeting & Get Invite Link</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
